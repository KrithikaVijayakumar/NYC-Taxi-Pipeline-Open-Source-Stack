name: CI 
on: 
  push: 
    branches: [main] 
  pull_request: 
    branches: [main] 
jobs: 
  test: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v3 
      - uses: actions/setup-python@v4 
        with: 
          python-version: "3.12" 
      - name: Install dependencies 
        run: pip install requests pyarrow boto3 pydantic pandas pytest ruff 
      - name: Lint 
        run: ruff check ingestion/ --ignore E501 
      - name: Run tests 
        run: pytest tests/ -v --tb=short 
